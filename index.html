<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>潮位観測情報</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <h1>潮位観測情報</h1>
    <p class="subtitle">
      気象庁 検潮所データ（5分更新）
      <span id="basetime"></span>
    </p>
    <p class="data-source">
      データ出典：<a href="https://www.jma.go.jp/bosai/tidelevel/" target="_blank" rel="noopener">気象庁 潮位観測情報</a>
    </p>
  </header>

  <div class="global-zoom-bar">
    <div class="global-zoom-bar-inner">
    <div id="global-zoom" class="global-zoom">
      <span class="global-zoom-label">表示範囲（時間）：</span>
      <button class="zoom-btn" data-mode="36h">36</button>
      <button class="zoom-btn active" data-mode="24h">24</button>
      <button class="zoom-btn" data-mode="12h">12</button>
      <button class="zoom-btn" data-mode="6h">6</button>
      <span class="zoom-separator"></span>
      <button class="zoom-btn" data-mode="±12h">±12</button>
      <button class="zoom-btn" data-mode="±6h">±6</button>
      <button class="zoom-btn" data-mode="±3h">±3</button>
      <button class="zoom-btn" data-mode="±1h">±1</button>
    </div>
    <button id="select-stations-btn" class="select-btn">観測所を選択</button>
    </div>
  </div>

  <!-- 観測所選択モーダル -->
  <div id="station-modal" class="modal-overlay" hidden>
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title">観測所を選択</h3>
        <span id="modal-count" class="modal-count">0局選択中</span>
        <button id="modal-close-btn" class="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button id="modal-reset-btn" class="modal-reset">沖縄（デフォルト）</button>
        <button id="modal-apply-btn" class="modal-apply">適用</button>
      </div>
    </div>
  </div>

  <main>
    <div id="status-message" class="status-loading">データを読み込み中...</div>
    <div id="station-grid" class="station-grid"></div>
  </main>

  <footer>
    <p>
      データ提供：<a href="https://www.jma.go.jp/" target="_blank" rel="noopener">気象庁</a>
      ／ 単位：cm（TP：東京湾平均海面基準）
    </p>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
